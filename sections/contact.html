<div class="unslate_co--section" id="contact-section">
        <div class="container">
          <div class="section-heading-wrap text-center mb-5">
            <h2 class="heading-h2 text-center divider"><span class="gsap-reveal">Contact</span></h2>
            <span class="gsap-reveal"><img src="images/divider-line.svg" alt="divider" width="76" loading="lazy" decoding="async" fetchpriority="low"></span>
          </div>


          <div class="row justify-content-between">
            
            <div class="col-md-6">
              <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" class="form-outline-style-v1" id="contactForm">
                <input type="hidden" name="form-name" value="contact">
                <p class="d-none">
                  <label>Do not fill this out if you're human: <input name="bot-field"></label>
                </p>
                <div class="form-group row mb-0">

                  <div class="col-lg-6 form-group gsap-reveal">
                    <label for="name">Name</label>
                    <input name="name" type="text" class="form-control" id="name" required>
                  </div>
                  <div class="col-lg-6 form-group gsap-reveal">
                    <label for="email">Email</label>
                    <input name="email" type="email" class="form-control" id="email" required>
                  </div>
                  <div class="col-lg-12 form-group gsap-reveal">
                    <label for="message">Write your message...</label>
                    <textarea name="message" id="message" cols="30" rows="7" class="form-control" required></textarea>
                  </div>
                </div>
                <div class="form-group row gsap-reveal">
                    <div class="col-md-12 d-flex align-items-center">
                      <input type="submit" class="btn btn-outline-pill btn-custom-light mr-3" value="Send Message">
                    </div>
                  </div>
              </form>
              <div id="contact-submit-popup" class="contact-submit-modal" aria-hidden="true">
                <div class="contact-submit-modal__backdrop" data-close-contact-popup></div>
                <div class="contact-submit-modal__dialog" role="alertdialog" aria-modal="true" aria-labelledby="contact-submit-popup-title">
                  <button type="button" class="contact-submit-modal__close" aria-label="Close" data-close-contact-popup>&times;</button>
                  <h3 id="contact-submit-popup-title">Message Status</h3>
                  <p id="contact-submit-popup-message" class="contact-submit-modal__message" aria-live="polite"></p>
                </div>
              </div>

            </div>

            <div class="col-md-4">
              <div class="contact-info-v1">
                <div class="gsap-reveal d-block">
                  <span class="d-block contact-info-label">Email</span>
                  <a href="mailto:mail.pravinchoudhary@gmail.com" class="contact-info-val">mail.pravinchoudhary@gmail.com</a>
                </div>
                <div class="gsap-reveal d-block">
                  <span class="d-block contact-info-label">Phone</span>
                  <a href="tel:+918788941075" class="contact-info-val">+91-8788941075</a>
                </div>
                <div class="gsap-reveal d-block contact-links-block">
                  <span class="d-block contact-info-label">Links</span>
                  <address class="contact-info-val"><a href="https://www.linkedin.com/in/pravinchoudhary09/" target="_blank">LinkedIn</a> <br> <a href="https://github.com/PravinChoudhary11" target="_blank">GitHub</a></address>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
