<!doctype html>
<html lang="en">
  <head>
    <title>Project Detail - Pravin Choudhary</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <meta name="description" content="Detailed case study page for portfolio projects by Pravin Choudhary.">
    <meta name="author" content="Pravin Choudhary">
    <link rel="icon" type="image/png" href="images/auther-herox.png">
    <link rel="apple-touch-icon" href="images/auther-herox.png">

    <link rel="stylesheet" href="css/vendor/icomoon/style.css">
    <link rel="stylesheet" href="css/vendor/owl.carousel.min.css">
    <link rel="stylesheet" href="css/vendor/animate.min.css">
    <link rel="stylesheet" href="css/vendor/aos.css">
    <link rel="stylesheet" href="css/vendor/bootstrap.min.css">
    <link rel="stylesheet" href="css/vendor/jquery.fancybox.min.css">
    <link rel="stylesheet" href="css/style.css">

    <script>
      (function () {
        try {
          if (localStorage.getItem("site-theme") !== "dark") {
            document.documentElement.classList.add("light-theme");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="project-detail-page">
    <div class="unslate_co--site-wrap">
      <div class="unslate_co--site-inner">
        <div class="project-detail-topbar">
          <div class="container">
            <div class="project-detail-topbar-inner">
              <a href="index.html" class="project-detail-brand">Pravin<span>.</span></a>

              <div class="project-topbar-actions">
                <button type="button" class="theme-toggle-btn js-theme-toggle" aria-label="Toggle color theme" title="Switch theme">
                  <span class="theme-toggle-icon" aria-hidden="true"></span>
                </button>

                <a href="index.html#portfolio-section" class="project-back-link">
                  <span class="project-back-arrow">&larr;</span>
                  <span>Back To Projects</span>
                </a>
              </div>
            </div>
          </div>
        </div>

        <div class="project-detail-cover">
          <div class="container">
            <p class="project-detail-kicker" id="project-kicker">Project Case Study</p>
            <h1 class="project-detail-title" id="project-title">Loading project...</h1>
            <p class="project-detail-subtitle" id="project-subtitle"></p>

            <div class="project-detail-actions">
              <a id="project-live-link" class="btn btn-outline-pill btn-custom-light" href="#" target="_blank" rel="noopener noreferrer">View Live</a>
              <a id="project-source-link" class="btn btn-outline-pill btn-custom-light" href="#" target="_blank" rel="noopener noreferrer">View Source</a>
            </div>
          </div>
        </div>

        <section class="unslate_co--section project-detail-section">
          <div class="container">
            <div class="row">
              <div class="col-lg-4 mb-4 mb-lg-0">
                <div class="project-detail-panel">
                  <h3>Quick Facts</h3>
                  <ul class="project-facts" id="project-facts"></ul>
                </div>
              </div>
              <div class="col-lg-8">
                <div class="project-detail-panel mb-4">
                  <h3>What This Project Does</h3>
                  <p id="project-what"></p>
                </div>

                <div class="project-detail-panel mb-4">
                  <h3>How It Works</h3>
                  <p id="project-how"></p>
                </div>

                <div class="project-detail-panel mb-4">
                  <h3>Why I Built This</h3>
                  <p id="project-why"></p>
                </div>

                <div class="project-detail-panel">
                  <h3>Key Learnings</h3>
                  <ul id="project-learnings" class="project-learnings"></ul>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>

      <footer class="unslate_co--footer unslate_co--section">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-md-7 text-center">
              <div class="footer-site-logo"><a href="index.html">Pravin<span>.</span></a></div>
              <p class="site-copyright">
                Copyright &copy;
                <script>
                  document.write(new Date().getFullYear());
                </script>
                Pravin Choudhary. Designed and developed by Pravin Choudhary.
              </p>
            </div>
          </div>
        </div>
      </footer>
    </div>

    <script src="js/vendor/jquery-3.3.1.min.js"></script>
    <script src="js/vendor/bootstrap.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/project-detail.js"></script>
  </body>
</html>
